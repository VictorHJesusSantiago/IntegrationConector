services:
  postgres:
    image: postgres:16-alpine
    container_name: integrationconnector-postgres
    environment:
      POSTGRES_DB: integrationconnector
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - integrationconnector_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: integrationconnector-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/IntegrationConnector.Api/Dockerfile
    container_name: integrationconnector-api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=integrationconnector;Username=postgres;Password=postgres"
      RabbitMq__Host: rabbitmq
      Jwt__SigningKey: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS"
      DataProtection__KeysDirectory: "/keys"
    volumes:
      - integrationconnector_dpkeys:/keys
    ports:
      - "8080:8080"

volumes:
  integrationconnector_pgdata:
  integrationconnector_dpkeys:
